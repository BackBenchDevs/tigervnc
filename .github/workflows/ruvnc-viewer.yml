name: RuVNC Viewer CI

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'ruvnc-viewer/**'
      - 'common/**'
      - '.github/workflows/ruvnc-viewer.yml'
  pull_request:
    branches: [master]
    paths:
      - 'ruvnc-viewer/**'
      - 'common/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install C/C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-turbo8-dev libgnutls28-dev \
            nettle-dev libgmp-dev libpixman-1-dev zlib1g-dev libpam0g-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruvnc-viewer
          shared-key: ruvnc-linux
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Check formatting
        working-directory: ruvnc-viewer
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ruvnc-viewer
        run: cargo clippy -- -D warnings

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install C/C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-turbo8-dev libgnutls28-dev \
            nettle-dev libgmp-dev libpixman-1-dev zlib1g-dev libpam0g-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruvnc-viewer
          shared-key: ruvnc-linux
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Run tests
        working-directory: ruvnc-viewer
        run: cargo test

  build-linux:
    name: Linux (x86_64)
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-turbo8-dev libgnutls28-dev \
            nettle-dev libgmp-dev libpixman-1-dev zlib1g-dev libpam0g-dev \
            libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruvnc-viewer
          shared-key: ruvnc-linux
          cache-on-failure: "true"

      - name: Build
        working-directory: ruvnc-viewer
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ruvnc-viewer-linux-x86_64
          path: ruvnc-viewer/target/release/ruvnc-viewer

  build-macos-arm64:
    name: macOS (ARM64)
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install jpeg-turbo gnutls nettle gmp pixman zlib pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ruvnc-viewer
          shared-key: ruvnc-macos-arm64
          cache-on-failure: "true"

      - name: Build
        working-directory: ruvnc-viewer
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ruvnc-viewer-macos-arm64
          path: ruvnc-viewer/target/release/ruvnc-viewer

  build-windows:
    name: Windows (x64)
    needs: [test]
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-nettle
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-pkg-config

      - name: Build
        working-directory: ruvnc-viewer
        run: cargo build --release

      - name: Collect Windows artifacts
        run: |
          mkdir -p ruvnc-viewer/dist
          cp ruvnc-viewer/target/release/ruvnc-viewer.exe ruvnc-viewer/dist/
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            dllpath="$(which $dll 2>/dev/null || true)"
            if [ -n "$dllpath" ]; then
              cp "$dllpath" ruvnc-viewer/dist/
            fi
          done

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ruvnc-viewer-windows-x64
          path: ruvnc-viewer/dist/

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    needs: [build-linux, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Package release assets
        run: |
          cd release-artifacts
          for dir in ruvnc-viewer-*; do
            cp ../ruvnc-viewer/LICENSE "$dir/"
            cp ../ruvnc-viewer/NOTICE.md "$dir/"
            tar czf "${dir}.tar.gz" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.tar.gz
          body: |
            ## RuVNC Viewer ${{ github.ref_name }}

            Modern Rust/egui VNC viewer built on the TigerVNC protocol engine.

            **License:** GPL-2.0-or-later
            **Source Code:** https://github.com/BackBenchDevs/tigervnc

            This program is distributed in the hope that it will be useful,
            but WITHOUT ANY WARRANTY; without even the implied warranty of
            MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.
